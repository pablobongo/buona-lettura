<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1A1A2E" />
  <meta name="description" content="Buona Lettura — il tuo archivio personale di letture" />

  <!-- Link al manifest PWA (creato in seguito) -->
  <link rel="manifest" href="manifest.json" />

  <!-- Font Google: Lora per titoli, Inter per corpo -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <title>Buona Lettura</title>

  <style>
    /* ─────────────────────────────────────────────
       RESET E VARIABILI GLOBALI
       Palette "Sera di Velluto" — definitiva
    ───────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --colore-primario:   #1A1A2E;   /* notte blu profonda */
      --colore-secondario: #16213E;   /* blu leggermente più caldo */
      --colore-accento:    #C8963C;   /* oro rame */
      --colore-accento-chiaro: #E8C06A; /* oro chiaro per gradienti */
      --colore-testo:      #EDE8DC;   /* pergamena chiara */
      --colore-testo-tenue: rgba(237, 232, 220, 0.45);
      --colore-testo-fantasma: rgba(237, 232, 220, 0.2);
      --colore-bordo:      rgba(200, 150, 60, 0.2);
      --colore-superficie: rgba(255, 255, 255, 0.04);
      --font-titolo:       'Lora', Georgia, serif;
      --font-corpo:        'Inter', system-ui, sans-serif;
      --raggio:            16px;
      --raggio-piccolo:    8px;
      --transizione:       0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-corpo);
      background: var(--colore-primario);
      color: var(--colore-testo);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      /* Impedisce flash bianco durante caricamento */
      -webkit-font-smoothing: antialiased;
    }

    /* ─────────────────────────────────────────────
       SFONDO — striscia oro in cima + cerchi decorativi
    ───────────────────────────────────────────── */
    .sfondo-striscia {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg,
        transparent,
        var(--colore-accento) 20%,
        var(--colore-accento-chiaro) 50%,
        var(--colore-accento) 80%,
        transparent
      );
      z-index: 10;
    }

    /* Cerchi decorativi di sfondo — atmosfera */
    .cerchio-deco {
      position: fixed;
      border-radius: 50%;
      border: 1px solid rgba(200, 150, 60, 0.06);
      pointer-events: none;
      animation: pulsa 8s ease-in-out infinite;
    }
    .cerchio-deco:nth-child(1) {
      width: 500px; height: 500px;
      top: -180px; left: -160px;
      animation-delay: 0s;
    }
    .cerchio-deco:nth-child(2) {
      width: 350px; height: 350px;
      bottom: -120px; right: -100px;
      animation-delay: -3s;
    }
    .cerchio-deco:nth-child(3) {
      width: 220px; height: 220px;
      top: 40%; right: -60px;
      animation-delay: -5s;
    }

    @keyframes pulsa {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(1.03); }
    }

    /* ─────────────────────────────────────────────
       CONTENITORE PRINCIPALE
    ───────────────────────────────────────────── */
    .splash-contenitore {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 32px;
      max-width: 340px;
      width: 100%;
      gap: 0;
      /* Animazione di entrata — tutto appare insieme, dal basso */
      animation: entrata 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes entrata {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─────────────────────────────────────────────
       ICONA — libro aperto con righe di testo
    ───────────────────────────────────────────── */
    .icona-contenitore {
      width: 88px;
      height: 88px;
      background: rgba(200, 150, 60, 0.1);
      border-radius: 24px;
      border: 1px solid var(--colore-bordo);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      /* Leggera pulsazione dell'icona durante il caricamento */
      animation: icona-brillo 2.5s ease-in-out infinite;
    }

    @keyframes icona-brillo {
      0%, 100% { box-shadow: 0 0 0 0 rgba(200, 150, 60, 0); }
      50%       { box-shadow: 0 0 0 8px rgba(200, 150, 60, 0.08); }
    }

    /* SVG del libro aperto — disegnato a mano, non icona esterna */
    .icona-libro {
      width: 44px;
      height: 44px;
    }

    /* ─────────────────────────────────────────────
       TITOLO E SOTTOTITOLO
    ───────────────────────────────────────────── */
    .titolo-app {
      font-family: var(--font-titolo);
      font-size: 30px;
      font-weight: 600;
      color: var(--colore-testo);
      letter-spacing: 0.01em;
      margin-bottom: 6px;
      line-height: 1.15;
    }

    .sottotitolo-app {
      font-family: var(--font-titolo);
      font-size: 13px;
      font-style: italic;
      color: var(--colore-testo-tenue);
      margin-bottom: 28px;
    }

    /* ─────────────────────────────────────────────
       DIVISORE DECORATIVO
    ───────────────────────────────────────────── */
    .divisore {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--colore-accento), transparent);
      margin-bottom: 24px;
    }

    /* ─────────────────────────────────────────────
       STATISTICHE DINAMICHE
       Lette da localStorage — zero se prima apertura
    ───────────────────────────────────────────── */
    .statistiche-riga {
      display: flex;
      gap: 32px;
      margin-bottom: 36px;
      align-items: flex-start;
    }

    .stat-blocco {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .stat-numero {
      font-family: var(--font-titolo);
      font-size: 26px;
      font-weight: 500;
      color: var(--colore-accento);
      line-height: 1;
      /* Animazione contatore — i numeri "saltano" all'entrata */
      animation: conta-su 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
    }

    @keyframes conta-su {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stat-etichetta {
      font-size: 10px;
      color: var(--colore-testo-fantasma);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Separatori verticali tra le statistiche */
    .stat-separatore {
      width: 1px;
      height: 32px;
      background: var(--colore-bordo);
      margin-top: 4px;
    }

    /* ─────────────────────────────────────────────
       BARRA DI CARICAMENTO
    ───────────────────────────────────────────── */
    .loader-contenitore {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 0;
    }

    .loader-barra {
      width: 120px;
      height: 2px;
      background: rgba(237, 232, 220, 0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-riempimento {
      height: 100%;
      background: linear-gradient(90deg, var(--colore-accento), var(--colore-accento-chiaro));
      border-radius: 2px;
      width: 0%;
      /* La barra si riempie in 2 secondi — poi redirect */
      animation: carica 2s cubic-bezier(0.4, 0, 0.2, 1) 0.3s forwards;
    }

    @keyframes carica {
      0%   { width: 0%; }
      60%  { width: 75%; }
      85%  { width: 90%; }
      100% { width: 100%; }
    }

    .loader-testo {
      font-size: 10px;
      color: var(--colore-testo-fantasma);
      letter-spacing: 0.06em;
    }

    /* ─────────────────────────────────────────────
       BADGE VERSIONE — in basso, discreto
    ───────────────────────────────────────────── */
    .versione-badge {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--colore-testo-fantasma);
      background: var(--colore-superficie);
      border: 0.5px solid rgba(237, 232, 220, 0.08);
      border-radius: 20px;
      padding: 4px 12px;
      letter-spacing: 0.06em;
      /* Appare in ritardo per non distrarre */
      animation: entrata 0.5s ease 1s both;
    }

    /* ─────────────────────────────────────────────
       ANIMAZIONE DI USCITA — prima del redirect
    ───────────────────────────────────────────── */
    body.uscita {
      animation: dissolvenza 0.4s ease forwards;
    }

    @keyframes dissolvenza {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* ─────────────────────────────────────────────
       STATO PRIMA APERTURA — messaggio di benvenuto
    ───────────────────────────────────────────── */
    .benvenuto-testo {
      font-size: 11px;
      color: var(--colore-testo-tenue);
      font-style: italic;
      font-family: var(--font-titolo);
      margin-top: -20px;
      margin-bottom: 36px;
      display: none; /* visibile solo alla prima apertura */
    }
  </style>
</head>

<body>
  <!-- Striscia oro in cima -->
  <div class="sfondo-striscia" aria-hidden="true"></div>

  <!-- Cerchi decorativi di sfondo -->
  <div class="cerchio-deco" aria-hidden="true"></div>
  <div class="cerchio-deco" aria-hidden="true"></div>
  <div class="cerchio-deco" aria-hidden="true"></div>

  <!-- ── CONTENUTO PRINCIPALE ── -->
  <main class="splash-contenitore" role="main">

    <!-- Icona libro aperto con 4 righe di testo simulate -->
    <div class="icona-contenitore" aria-hidden="true">
      <svg class="icona-libro" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- copertine del libro aperto -->
        <path d="M4 9C4 9 10 8 22 11C34 8 40 9 40 9V35C40 35 34 34 22 37C10 34 4 35 4 35V9Z"
              stroke="#C8963C" stroke-width="1.6" stroke-linejoin="round"/>
        <!-- dorso centrale -->
        <path d="M22 11V37" stroke="#C8963C" stroke-width="1.6"/>
        <!-- pagina sinistra — 4 righe -->
        <path d="M8 15C11 14.2 15 14.2 19 15"   stroke="#C8963C" stroke-width="1.1" stroke-linecap="round" opacity="0.7"/>
        <path d="M8 19C11 18.2 15 18.2 19 19"   stroke="#C8963C" stroke-width="1.1" stroke-linecap="round" opacity="0.7"/>
        <path d="M8 23C11 22.2 15 22.2 19 23"   stroke="#C8963C" stroke-width="1.1" stroke-linecap="round" opacity="0.5"/>
        <path d="M8 27C10 26.4 13 26.4 16 27"   stroke="#C8963C" stroke-width="1.1" stroke-linecap="round" opacity="0.35"/>
        <!-- pagina destra — 4 righe -->
        <path d="M25 15C29 14.2 33 14.2 36 15"  stroke="#C8963C" stroke-width="1.1" stroke-linecap="round" opacity="0.7"/>
        <path d="M25 19C29 18.2 33 18.2 36 19"  stroke="#C8963C" stroke-width="1.1" stroke-linecap="round" opacity="0.7"/>
        <path d="M25 23C29 22.2 33 22.2 36 23"  stroke="#C8963C" stroke-width="1.1" stroke-linecap="round" opacity="0.5"/>
        <path d="M25 27C27 26.4 30 26.4 33 27"  stroke="#C8963C" stroke-width="1.1" stroke-linecap="round" opacity="0.35"/>
      </svg>
    </div>

    <!-- Nome applicazione -->
    <h1 class="titolo-app">Buona Lettura</h1>
    <p class="sottotitolo-app">Il tuo archivio personale</p>

    <!-- Messaggio prima apertura — visibile solo se nessun libro registrato -->
    <p class="benvenuto-testo" id="msgBenvenuto">
      Benvenuto — inizia aggiungendo il tuo primo libro.
    </p>

    <!-- Divisore decorativo -->
    <div class="divisore" aria-hidden="true"></div>

    <!-- Statistiche dinamiche da localStorage -->
    <div class="statistiche-riga" aria-label="Le tue statistiche">
      <div class="stat-blocco">
        <span class="stat-numero" id="statLibri">0</span>
        <span class="stat-etichetta">letti</span>
      </div>
      <div class="stat-separatore" aria-hidden="true"></div>
      <div class="stat-blocco">
        <span class="stat-numero" id="statPagine">0</span>
        <span class="stat-etichetta">pagine</span>
      </div>
      <div class="stat-separatore" aria-hidden="true"></div>
      <div class="stat-blocco">
        <span class="stat-numero" id="statVoto">—</span>
        <span class="stat-etichetta">voto medio</span>
      </div>
    </div>

    <!-- Barra di caricamento -->
    <div class="loader-contenitore" aria-live="polite" aria-label="Caricamento in corso">
      <div class="loader-barra">
        <div class="loader-riempimento" id="barraCaricare"></div>
      </div>
      <span class="loader-testo" id="testoLoader">Caricamento in corso…</span>
    </div>

  </main>

  <!-- Badge versione — fisso in basso -->
  <footer class="versione-badge" aria-label="Versione applicazione">
    v 1.3.0
  </footer>

  <script>
    /*
     * LOGICA SPLASH SCREEN
     * ─────────────────────────────────────────────
     * 1. Legge i dati da localStorage (chiave "bl_statistiche")
     * 2. Popola i numeri in modo dinamico
     * 3. Se non ci sono dati, mostra il messaggio di benvenuto
     * 4. Dopo 2,5 secondi reindirizza verso app.html
     */

    // Versione dell'app — aggiornare ad ogni rilascio
    const VERSIONE = '1.0.0';

    // ── Lettura statistiche da localStorage ──────
    function leggiStatistiche() {
      try {
        const datiGrezzi = localStorage.getItem('bl_statistiche');
        if (!datiGrezzi) return null;
        return JSON.parse(datiGrezzi);
      } catch (errore) {
        // Se localStorage è corrotto, si riparte da zero
        console.warn('Buona Lettura: impossibile leggere le statistiche.', errore);
        return null;
      }
    }

    // ── Formattazione numero pagine con separatore migliaia ──
    function formattaNumero(n) {
      if (n === 0) return '0';
      return n.toLocaleString('it-IT');
    }

    // ── Popola i valori nella pagina ─────────────
    function popolaStatistiche(dati) {
      const elLibri  = document.getElementById('statLibri');
      const elPagine = document.getElementById('statPagine');
      const elVoto   = document.getElementById('statVoto');
      const elMsg    = document.getElementById('msgBenvenuto');

      if (!dati || dati.totaleLibri === 0) {
        // Prima apertura: nessun libro ancora registrato
        elLibri.textContent  = '0';
        elPagine.textContent = '0';
        elVoto.textContent   = '—';
        elMsg.style.display  = 'block';
      } else {
        // Dati reali presenti
        elLibri.textContent  = dati.totaleLibri;
        elPagine.textContent = formattaNumero(dati.totalePagine || 0);
        elVoto.textContent   = dati.votoMedio
          ? dati.votoMedio.toFixed(1).replace('.', ',')
          : '—';
      }
    }

    // ── Testi di caricamento — variano ad ogni apertura ──
    const testiLoader = [
      'Caricamento in corso…',
      'Preparando la libreria…',
      'Sfogliando gli scaffali…',
      'Quasi pronto…',
    ];

    function impostaTesto() {
      const el = document.getElementById('testoLoader');
      const indice = Math.floor(Math.random() * testiLoader.length);
      el.textContent = testiLoader[indice];
    }

    // ── Redirect verso app.html dopo 2,5 secondi ──
    function avviaRedirect() {
      setTimeout(() => {
        // Animazione di uscita prima del cambio pagina
        document.body.classList.add('uscita');
        setTimeout(() => {
          window.location.href = 'app.html';
        }, 400);
      }, 2500);
    }

    // ── Inizializzazione ──────────────────────────
    (function init() {
      const dati = leggiStatistiche();
      popolaStatistiche(dati);
      impostaTesto();
      avviaRedirect();
    })();
  </script>

  <script>
    /*
     * REGISTRAZIONE SERVICE WORKER
     * ─────────────────────────────────────────────
     * Viene eseguita dopo il caricamento della pagina.
     * Richiede che l'app sia servita via HTTP/HTTPS (non file://).
     * Su Windows: usa Live Server in VS Code oppure "npx serve ."
     */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('./sw.js', { scope: './' })
          .then((registrazione) => {
            console.log('[BL] Service worker registrato. Scope:', registrazione.scope);
          })
          .catch((errore) => {
            console.warn('[BL] Registrazione service worker fallita:', errore);
            /* L'app funziona comunque — solo senza cache offline */
          });
      });
    } else {
      console.info('[BL] Service worker non supportato da questo browser.');
    }
  </script>
</body>
</html>
